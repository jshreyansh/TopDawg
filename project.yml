name: TopDawg
options:
  bundleIdPrefix: com.topdawg
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "12.0"

targets:
  TopDawg:
    type: application
    platform: macOS
    sources:
      - path: TopDawg
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: TopDawg/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.topdawg.app
        PRODUCT_NAME: TopDawg
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - sdk: Carbon.framework
    entitlements:
      path: TopDawg/TopDawg.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.cs.allow-jit: true
        com.apple.security.automation.apple-events: true
